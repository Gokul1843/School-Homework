
<!DOCTYPE html>
<html>
<head>
<title>Attendance System</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="firebase-config.js"></script>

<style>
body{font-family:Arial;background:#f5f5f5;padding:20px}
.box{background:#fff;padding:15px;border-radius:8px}
button{padding:10px;width:100%;background:#2a7bff;color:#fff;border:none}
</style>
</head>

<body>

<h2>Student Attendance</h2>

<div class="box">
Class:
<select id="class">
<option>1</option><option>2</option><option>3</option>
<option>4</option><option>5</option><option>6</option>
<option>7</option><option>8</option><option>9</option><option>10</option>
</select><br><br>

Date:
<input type="date" id="date"><br><br>

<textarea id="students" placeholder="Enter attendance
Example:
1-P
2-A
3-P" style="width:100%;height:150px"></textarea><br><br>

<button onclick="save()">Save Attendance</button>
</div>

<script>
function save(){
let cls=document.getElementById("class").value;
let date=document.getElementById("date").value;
let data=document.getElementById("students").value;

database.ref("attendance/class_"+cls+"/"+date).set({
attendance:data
});

alert("Attendance Saved Online ✅");
}
</script>

</body>
</html>
