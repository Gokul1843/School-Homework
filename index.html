<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>School Homework System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2a7bff">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.js"></script>
<style>

body{
    font-family:Arial,sans-serif;
    background:#ffffff;
    margin:10px;
    padding:5px;
}

.container{
    max-width:9998px;
    margin:auto;
}

h2{
    text-align:center;
    font-size:28px;
    margin-bottom:15px;
}

.class select{
    width:45%;
    padding:8px;
    font-size:16px;
}

input{
    width:95%;
    padding:8px;
    margin:5px 0;
    border:1px solid #999;
    border-radius:4px;
    box-sizing:border-box;
}

textarea{
    width:95%;
    padding:10px;
    margin:5px 0;
    min-height:55px;
    font-size:15px;
    border:2px solid #2a7bff;
    border-radius:6px;
    resize:none;
    overflow:hidden;
    box-sizing:border-box;
    background:#fff;
}

button{
    width:100%;
    padding:10px;
    margin-top:4px;
    border:none;
    background:#2a7bff;
    color:white;
    font-size:15px;
    border-radius:7px;
    cursor:pointer;
}

button:hover{
    opacity:1;
}

#sheet{
    background:#fff;
    border:2px solid #000;
    margin-top:15px;
    font-weight: bold;
    overflow:hidden;
    box-shadow:0 0 1px rgba(0,0,0,0.15);
}

.top{
    background:#a8f52d;
    text-align:center;
    font-weight:bold;
    font-size:26px;
    padding:15px;
    border-bottom:2px solid #000;
    line-height:35px;
    text-transform:uppercase;
}

.classline{
    text-align:center;
    font-weight:bold;
    font-size:24px;
    padding:7px;
    border-bottom:1px solid #000;
    background:#f8f8f8;
}

.dateRow{
    display:flex;
    border-bottom:5px solid #000;
   
}
.left{
font-size:20px;
padding: 4px;
}
.right1{
   font-size:20px;
   padding: 4px;
}
   

.dateRight{
    width:72%;
    padding:20px;
    font-weight:bold;
}

/* ===== TABLE ===== */
#homeworkTable{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
}

#homeworkTable th,
#homeworkTable td{
    border:1px solid #000;
    vertical-align:top;
    word-break:break-word;
      padding: 5px;
        line-height:1.5;
}

#homeworkTable th{
    background:#f5f5f5;
    font-size:18px;
    text-align:left;
}

.subjectCol{
    width:8%;
  
    font-size:17px;
    text-transform:uppercase;
    
}
.w{
    width: 18%;
}
.homeworkCol{
    width:7%;
    font-size:20px;
}

.hwtext{
    white-space:pre-wrap;
}

img{
    max-width:100%;
    height:auto;
    display:block;
    margin-top:3px;
    border-radius:5px;
}

/* ===== MOBILE ===== */

@media(max-width:600px){

    body{
        padding:2px;
    }

    h2{
        font-size:18px;
    }

    .class select{
        width:100%;
        font-size:16px;
    }

    input,
    textarea{
        width:100%;
        font-size:15px;
    }

    textarea{
        min-height:15px;
        padding:2px;
    }

    button{
        font-size:15px;
        padding:5px;
    }

    #sheet{
        width:100%;
        overflow:hidden;
    }

    .top{
        font-size:14px;
        line-height:16px;
        padding:7px;
    }
.left{
padding: 4px;font-size: 12px;
}
.right1{
   
   padding: 4px;
}
    .classline{
        font-size:12px;
        padding:4px;
    }
 
    #homeworkTable{
        width:100%;
    }

  
    #homeworkTable td{
      padding: 5px;
        line-height:1;
    }

    #homeworkTable th{
        font-size:12px !important;
        padding: 5px;
    }

    .subjectCol{
        width:10% !important;
        font-size:12px !important;
    }

    .homeworkCol{
        width:100% !important;
        font-size:10px !important;
    }

    .w{
        width:27%;
    }
.right1{
     font-size:12px !important;
}
    img{
        max-width:30px;
    }

}
</style>
</head>

 <tr>

    <tbody id="sheetRows"></tbody>

    <script>         
    let subjects = JSON.parse(localStorage.getItem("subjects")) ||
     ["MORAL", "ENGLISH", "ENGLISH-II", "MATHS", "SCIENCE", " SOCIAL S", "HINDI", " ASSAMESE ", " BODO", "CONVERSATION ", "COMPUTER", "GK"]; 
    const inputs = document.getElementById("inputs"); 
    const rows = document.getElementById("sheetRows"); 
    function saveSubjects() { localStorage.setItem("subjects", JSON.stringify(subjects)); } 
  
    function renderSubjects() {

inputs.innerHTML = "";
rows.innerHTML = "";

subjects.forEach(s => {

let safe = s.replace(/\s+/g, "_");

inputs.innerHTML += `
<div>
<b>${s}</b>

<textarea id="t_${safe}" 
oninput="autoGrow(this); saveData()"></textarea>

<input type="file" onchange="loadImg(event,'${safe}')">

</div><br>
`;

rows.innerHTML += `
<tr>
    <td class="subjectCol">${s}</td>

    <td class="homeworkCol">
        <div id="s_${safe}" class="hwtext"></div>
        <img id="i_${safe}">
    </td>
</tr>
`;

});

}
        function addSubject() {
            let s = newSubject.value.trim().toUpperCase();
            if (!s) 
            return alert("Enter subject");
            if (subjects.includes(s)) 
            return alert("Already exists"); 
            subjects.push(s);

saveSubjects();

renderSubjects();

loadClass();

newSubject.value = "";
            
        } function deleteSubject() { let s = newSubject.value.trim().toUpperCase(); 
                                    if (!subjects.includes(s)) 
            return alert("Subject not found"); subjects = subjects.filter(x => x !== s); 
            saveSubjects();

renderSubjects();

loadClass();{
        
       
               function key() { 
    return "class_" + classSel.value + "_" + date.value.replaceAll("/", "-"); 
}
             async function saveData() {

    let data = {};

    document.getElementById("d").innerText = date.value;

    subjects.forEach(s => {

        let safe = s.replace(/\s+/g, "_");

        data[s] = {
            text: document.getElementById("t_" + safe).value,
            img: document.getElementById("i_" + safe).src || ""
        };

        document.getElementById("s_" + safe).innerText = data[s].text;

    });

    localStorage.setItem(key(), JSON.stringify(data));

    await saveOnline(key(), data);

}
        async function loadClass() {

    c.innerText = classSel.value;

    d.innerText = date.value;

    if (rows.innerHTML === "") {
    renderSubjects();
}
let data = await loadOnline(key());

if (!data) {

    let offline = localStorage.getItem(key());

    if (offline) {
        data = JSON.parse(offline);
    }

}

    if (data) {

    subjects.forEach(s => {

        let safe = s.replace(/\s+/g, "_");

        if (data[s]) {

            document.getElementById("t_" + safe).value = data[s].text;

            autoGrow(document.getElementById("t_" + safe));

            document.getElementById("s_" + safe).innerText = data[s].text;

            document.getElementById("i_" + safe).src = data[s].img;

        }

    });

}

                      function autoGrow(el) {

    if (el.value.trim() === "") {
        el.style.height = "50px";
    } else {
        el.style.height = "auto";
        el.style.height = el.scrollHeight + "px";
    }

}
                        function loadImg(e, s) {
            let r = new FileReader(); r.onload = () => 
            {
                 document.getElementById("i_" + s).src = r.result; saveData(); }
            r.readAsDataURL(e.target.files[0]);
        } function download() {
            html2canvas(document.getElementById("sheet"), { scale: 2 }).then(c => {
                let a = document.createElement("a"); a.download = "homework.png"; a.href = c.toDataURL();
                a.click();
            });
        } async function shareTable() {
            const sheet = document.getElementById("sheet");
            const canvas = await html2canvas(sheet, { scale: 2 }); canvas.toBlob(async (blob) => {
                const file = new File([blob], "homework.png", { type: "image/png" }); if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({ files: [file], title: "Homework", });
                } else { alert("Sharing not supported on this device"); }
            });
        }
        let t = new Date(); date.value =
String(t.getDate()).padStart(2, '0') + "/" +
String(t.getMonth() + 1).padStart(2, '0') + "/" + t.getFullYear();

const firebaseConfig = {

        window.saveOnline = async function (dataKey, data) {

    try {

        await set(ref(db, "homework/" + dataKey), data);

        console.log("Firebase Saved");

        
let m = document.getElementById("msg");
m.style.display = "block";

setTimeout(() => {
    m.style.display = "none";
}, 2000);
    } catch (err) {

        console.log(err);

        alert(err);


            }
        }
        window.loadOnline = 
            async function (dataKey) {
            const snapshot = await get(child(ref(db), "homework/" + dataKey));
            if (snapshot.exists()) {
                return snapshot.val();
            }
            return null;
        }
            
window.addEventListener("DOMContentLoaded", async () => {

    let t = new Date();

    date.value =
        t.getDate().toString().padStart(2, '0') + "/" +
        (t.getMonth() + 1).toString().padStart(2, '0') + "/" +
        t.getFullYear();

    renderSubjects();

    await loadClass();

});
      </script>
