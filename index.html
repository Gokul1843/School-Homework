<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>School Homework System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2a7bff">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma;
            background: #f0f0f0;
            margin: 0;
            padding: 10px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        h2 {
            text-align: center;
        }

        .class select {
            width: 40%;
            padding: 7px;
        }

        input {
            width: 70%;
            padding: 4px;
            margin: 5px 0;
        }

  textarea {
    width: 95%;
    padding: 10px;
    margin: 5px 0;
    height:50px;
    min-height:50px;
    font-size: 16px;
    border: 2px solid #2a7bff;
    border-radius: 8px;
    resize: none;
    overflow: hidden;
}
        button {
            padding: 8px;
            width: 100%;
            background: #2a7bff;
            color: rgb(255, 255, 255);
            border: none;
            margin-top: 5px;
        }

        .row {
            display: flex;
            border-bottom: 1px solid #040842;
        }

        .left {
            width: 20%;
            border-right: 1px solid #0e004e;
            padding: 6px;
            font-weight: bold;
        }

        .right {
            width: 70%;
            padding: 6px;
        }

        .hwtext {
            white-space: pre-wrap;
        }

        .right1 {
            width: 70%;
            padding: 6px;
            font-weight: bold;
        }

        #sheet {
            background: #ffffff;
            border: 2px solid #8c00ff;
            margin-top: 10px;
        }

        .top {
            background: rgb(111, 252, 30);
            text-align: center;
            font-weight: bold;
            padding: 8px;
            border-bottom: 2px solid #131755;
        }

        .classline {
            text-align: center;
            font-weight: bolder;
            border-bottom: 2px solid #000;
            padding: 5px;
        }

        img {
            max-width: 90%;
            margin-top: 3px;
        }



        #homeworkTable {
    width: 100%;
    border-collapse: collapse;
    table-layout: ;
    background: white;
}

#homeworkTable th,
#homeworkTable td {
    border: 1px solid #000;
    padding: 10px;
    vertical-align: top;
    word-wrap: break-word;
}

.subjectCol {
    width: 30%;
    font-weight: bold;
}

.homeworkCol {
    width: 70%;
}

@media(max-width:600px){

    .subjectCol{
        width:35%;
        font-size:5px;
    }

    .homeworkCol{
        width:65%;
        font-size:4px;
    }
}
    </style>
</head>

<body><div id="msg" style="
position:fixed;
top:20px;
right:20px;
background:#2a7bff;
color:white;
padding:10px 20px;
border-radius:8px;
display:none;
z-index:9999;
">
Saved Successfully ✅
</div>
    <div class="container">
        <h2><b>Homework Entry</b></h2>
        <div class="class"> Class: <select id="classSel" onchange="loadClass()">
                <option>NURSERY</option>
                <option>LKG</option>
                <option>UKG</option>
                <option>I</option>
                <option>II</option>
                <option>III</option>
                <option>IV</option>
                <option>V</option>
                <option>VI</option>
                <option>VII</option>
                <option>VIII</option>
                <option>IX</option>
                <option>X</option>
            </select> </div> <br> 
        
        <input id="date" readonly>
        <br><br>
        <b>Subjects (Add / Delete)</b><br> <input
            id="newSubject" placeholder="Enter subject name"> <button onclick="addSubject()">Add Subject</button>
        <button onclick="deleteSubject()">Delete Subject</button> <br><br>
        <div id="inputs"></div> <button onclick="download()">Download Sheet</button> <button
            onclick="shareTable()">Share on WhatsApp</button>
        <div id="sheet">
            <div class="top">IRVINE ADVENTIST ENGLISH SCHOOL BASBARI</div>
            <div class="classline">CLASS - <span id="c"></span></div>
            <div class="row">
                <div class="left">Date</div>
                <div class="right1" id="d"></div>
            </div>
           <table id="homeworkTable">
    <tr>
        <th style="width:30%">SUBJECT</th>
        <th>HOMEWORK</th>
    </tr>

    <tbody id="sheetRows"></tbody>
</table>
        </div>
    </div>

    <script>         
    let subjects = JSON.parse(localStorage.getItem("subjects")) ||
     ["MORAL", "ENGLISH", "ENGLISH-II", "MATHS", "SCIENCE", " SOCIAL S", "HINDI", " ASSAMESE ", " BODO", "CONVERSATION ", "COMPUTER", "GK"]; 
    const inputs = document.getElementById("inputs"); 
    const rows = document.getElementById("sheetRows"); 
    function saveSubjects() { localStorage.setItem("subjects", JSON.stringify(subjects)); } 
  
    function renderSubjects() {

inputs.innerHTML = "";
rows.innerHTML = "";

subjects.forEach(s => {

let safe = s.replace(/\s+/g, "_");

inputs.innerHTML += `
<div>
<b>${s}</b>

<textarea id="t_${safe}" 
oninput="autoGrow(this); saveData()"></textarea>

<input type="file" onchange="loadImg(event,'${safe}')">

</div><br>
`;

rows.innerHTML += `
<tr>
    <td class="subjectCol">${s}</td>

    <td class="homeworkCol">
        <div id="s_${safe}" class="hwtext"></div>
        <img id="i_${safe}">
    </td>
</tr>
`;

});

}
        function addSubject() {
            let s = newSubject.value.trim().toUpperCase();
            if (!s) 
            return alert("Enter subject");
            if (subjects.includes(s)) 
            return alert("Already exists"); 
            subjects.push(s);

saveSubjects();

renderSubjects();

loadClass();

newSubject.value = "";
            
        } function deleteSubject() { let s = newSubject.value.trim().toUpperCase(); 
                                    if (!subjects.includes(s)) 
            return alert("Subject not found"); subjects = subjects.filter(x => x !== s); 
            saveSubjects();

renderSubjects();

loadClass();}
        
       
               function key() { 
    return "class_" + classSel.value + "_" + date.value.replaceAll("/", "-"); 
}
             async function saveData() {

    let data = {};

    document.getElementById("d").innerText = date.value;

    subjects.forEach(s => {

        let safe = s.replace(/\s+/g, "_");

        data[s] = {
            text: document.getElementById("t_" + safe).value,
            img: document.getElementById("i_" + safe).src || ""
        };

        document.getElementById("s_" + safe).innerText = data[s].text;

    });

    localStorage.setItem(key(), JSON.stringify(data));

    await saveOnline(key(), data);

}
        async function loadClass() {

    c.innerText = classSel.value;

    d.innerText = date.value;

    if (rows.innerHTML === "") {
    renderSubjects();
}
let data = await loadOnline(key());

if (!data) {

    let offline = localStorage.getItem(key());

    if (offline) {
        data = JSON.parse(offline);
    }

}

    if (data) {

       subjects.forEach(s => {

    let safe = s.replace(/\s+/g, "_");

    if (data[s]) {

        document.getElementById("t_" + safe).value = data[s].text;

        autoGrow(document.getElementById("t_" + safe));

        document.getElementById("s_" + safe).innerText = data[s].text;

        document.getElementById("i_" + safe).src = data[s].img;

    }

});

    }

}
                       function autoGrow(el) {

    if (el.value.trim() === "") {
        el.style.height = "50px";
    } else {
        el.style.height = "auto";
        el.style.height = el.scrollHeight + "px";
    }

}
                        function loadImg(e, s) {
            let r = new FileReader(); r.onload = () => 
            {
                 document.getElementById("i_" + s).src = r.result; saveData(); }
            r.readAsDataURL(e.target.files[0]);
        } function download() {
            html2canvas(document.getElementById("sheet"), { scale: 2 }).then(c => {
                let a = document.createElement("a"); a.download = "homework.png"; a.href = c.toDataURL();
                a.click();
            });
        } async function shareTable() {
            const sheet = document.getElementById("sheet");
            const canvas = await html2canvas(sheet, { scale: 2 }); canvas.toBlob(async (blob) => {
                const file = new File([blob], "homework.png", { type: "image/png" }); if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({ files: [file], title: "Homework", });
                } else { alert("Sharing not supported on this device"); }
            });
        }
        let t = new Date(); date.value =
String(t.getDate()).padStart(2, '0') + "/" +
String(t.getMonth() + 1).padStart(2, '0') + "/" + t.getFullYear();
    </script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import {
            getDatabase,
            ref,
            set,
            get,
            child
        }
            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
        // Import the functions you need from the SDKs you need

const firebaseConfig = {
  apiKey: "AIzaSyBa5yGYP46YyEfRv_I7_Ot1WBABDMF-qvs",
  authDomain: "homework-12913.firebaseapp.com",
  databaseURL: "https://homework-12913-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "homework-12913",
  storageBucket: "homework-12913.firebasestorage.app",
  messagingSenderId: "580315928567",
  appId: "1:580315928567:web:2bd7144ad8f4724874c0f2"
};

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.saveOnline = async function (dataKey, data) {

    try {

        await set(ref(db, "homework/" + dataKey), data);

        console.log("Firebase Saved");

        
let m = document.getElementById("msg");
m.style.display = "block";

setTimeout(() => {
    m.style.display = "none";
}, 2000);
    } catch (err) {

        console.log(err);

        alert(err);


            }
        }
        window.loadOnline = 
            async function (dataKey) {
            const snapshot = await get(child(ref(db), "homework/" + dataKey));
            if (snapshot.exists()) {
                return snapshot.val();
            }
            return null;
        }
            
window.addEventListener("DOMContentLoaded", async () => {

    let t = new Date();

    date.value =
        t.getDate().toString().padStart(2, '0') + "/" +
        (t.getMonth() + 1).toString().padStart(2, '0') + "/" +
        t.getFullYear();

    renderSubjects();

    await loadClass();

});
      </script>


    <script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
    .then(() => console.log("SW Ready"));
}
</script>
    
</body>

</html>
